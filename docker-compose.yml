version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/legal_rag
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - api

  dashboard:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: streamlit run src/monitoring/dashboard.py --server.address 0.0.0.0 --server.port 8502
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/legal_rag
    volumes:
      - ./:/app
    ports:
      - "8502:8502"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
